<!DOCTYPE html>
<html>
<head>
<script src="jquery.min.js"></script>
<script src="jquery.serialize-object.min.js"></script>
<title>Formulario</title>
</head>
<style>
h1 {text-align: left;}
</style>
<body>
<h1>Formulario</h1>
<form id="test-form">
  
  <div>
    <label>Nombre:</label>
    <input type="text" name="person_name" placeholder="Introduzca su nombre"/>
  </div>

  <div>
    <label>eMail:</label>
    <input type="text" name="person_email" placeholder="Introduzca su eMail"/>
  </div>
  
  <div>
    <label>Indique su opinión sobre la página web:</label>
    <input type="text" name="person_opinion" placeholder="Díganos sus comentarios"/>
  </div>
  
  <div>
    <button type="submit"id="submit-form">Enviar</button>
  </div>
  
  <div id="success_id"></div>
  

</form>
<script type="text/javascript" language="javascript">
var $form = $('form#test-form'),
    url = 'https://script.google.com/macros/s/AKfycbyhUJe0HgIsDqZdZM98TCnE5tfjFeK5qFLDF-_DXAI5JJul4ZfL/exec'

$('#submit-form').on('click', function(e) {
  e.preventDefault();
  var jqxhr = $.ajax({
    url: url,
    method: "GET",
    dataType: "json",
    data: $form.serializeObject()
  }).success(
   $('#success_id').html("El formulario se ha enviado con éxito. Ya puedes cerrar esta ventana");
  );
})
</script>
</body>
</html>
