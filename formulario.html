<!DOCTYPE html>
<html>
<head>
<script src="jquery.min.js"></script>
<script src="jquery.serialize-object.min.js"></script>
<title>Formulario</title>
</head>
<body>
<h1>Formulario</h1>
<form id="formulario-j7">

<script>
$('#create').submit(function() { // catch the form's submit event
    $.ajax({ // create an AJAX call...
        data: $(this).serialize(), // get the form data
        type: $(this).attr('method'), // GET or POST
        url: $(this).attr('action'), // the file to call
        success: function(response) { // on success..
            $('#created').html(response); // update the DIV
        }
    });
    return false; // cancel original event to prevent form submitting
});
</script>
  
  <div>
    <label>Nombre:</label>
    <input type="text" name="person_name" placeholder="Introduzca su nombre"/>
  </div>

  <div>
    <label>eMail:</label>
    <input type="text" name="person_email" placeholder="Introduzca su eMail"/>
  </div>
  
  <div>
    <label>Indique su opinión sobre la página web:</label>
    <input type="text" name="person_opinion" placeholder="Díganos sus comentarios"/>
  </div>
  
  <div>
    <button type="submit" id="submit-form">Enviar</button>
  </div>
  
  <div id="success_id"></div>

</form>
<script type="text/javascript" language="javascript">
 var $form = $('form#formulario-j7'),
    url = 'https://script.google.com/macros/s/AKfycbzuIUCXEzvHi8U5bOSpxbZzUkLrjvmitYjGk4VhkPty3GP8A_Rl/exec'

$('#submit-form').on('click', function(e) {
  e.preventDefault();
  var jqxhr = $.ajax({
    url: url,
    method: "GET",
    dataType: "json",
    data: $form.serializeObject()
  }).done(
    // do something
  );
})
</script>
</body>
</html>
